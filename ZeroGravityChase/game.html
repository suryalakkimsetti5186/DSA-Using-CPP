<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-G Chase</title>
    <meta name="description" content="A gravity-defying chase game with web-slinging action in a floating cityscape.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui-layer">
        <div id="main-menu" class="glass-panel active">
            <h1>ZERO-G CHASE</h1>
            <p>Sling through the floating city. Escape the Enforcer.</p>
            <p class="controls-hint">Hold Left Click/Touch on floating debris to pull yourself forward.</p>
            <button id="start-btn">ENGAGE THRUSTERS</button>
        </div>
        <div id="game-hud" class="hidden">
            <div class="score-display">DISTANCE: <span id="score-val">0</span>m</div>
            <div class="distance-warning">ENFORCER DISTANCE: <span id="enforcer-dist">SAFE</span></div>
        </div>
        <div id="game-over" class="glass-panel hidden">
            <h2>CAUGHT</h2>
            <p>The Enforcer has apprehended you.</p>
            <p>DISTANCE COVERED: <span id="final-score"></span>m</p>
            <button id="restart-btn">RETRY RUN</button>
        </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <script src="main.js"></script>
</body>
</html>
