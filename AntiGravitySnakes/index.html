<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity Snakes & Ladders</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <div class="ui-layer">
        <header>
            <h1>Anti-Gravity<br><span>Snakes & Ladders</span></h1>
            <p id="status-text">Player 1's Turn</p>
        </header>

        <div class="controls">
            <div class="scene-dice" id="dice-container">
                <div class="cube" id="dice">
                    <div class="cube__face cube__face--front">1</div>
                    <div class="cube__face cube__face--back">6</div>
                    <div class="cube__face cube__face--right">3</div>
                    <div class="cube__face cube__face--left">4</div>
                    <div class="cube__face cube__face--top">2</div>
                    <div class="cube__face cube__face--bottom">5</div>
                </div>
            </div>
            <button id="roll-button">Roll Dice</button>
        </div>

        <div class="log" id="game-log">
            <p>Welcome to the weightless playground.</p>
        </div>
    </div>

    <div class="scene">
        <div class="board-wrapper">
            <div class="board" id="board">
                <!-- Squares injected via JS -->
            </div>
            <svg id="connections-layer" class="connections"></svg>
            <div id="players-layer"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
